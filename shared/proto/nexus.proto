syntax = "proto3";

package nexus.v1;

message EventPayload {
  string event_id = 1;
  string type = 2;
  string source = 3;
  string timestamp = 4;
  string correlation_id = 5;
  string payload_json = 6;
  map<string, string> metadata = 7;
}

message ContextItem {
  string id = 1;
  string kind = 2;
  string summary = 3;
  double score = 4;
  map<string, string> metadata = 5;
}

message ConflictFinding {
  string conflict_id = 1;
  string type = 2;
  string severity = 3;
  double confidence = 4;
  string reasoning = 5;
  string recommendation = 6;
  string related_decision_id = 7;
}

message Recommendation {
  string recommendation_id = 1;
  string title = 2;
  string summary = 3;
  string action = 4;
  string priority = 5;
}

message TimelineEntry {
  string timeline_id = 1;
  string event_id = 2;
  string kind = 3;
  string summary = 4;
  string timestamp = 5;
  string correlation_id = 6;
}

message AIAnalysisResult {
  string event_id = 1;
  string correlation_id = 2;
  string status = 3;
  string decision_json = 4;
  repeated ContextItem context = 5;
  repeated ConflictFinding conflicts = 6;
  repeated Recommendation recommendations = 7;
  repeated TimelineEntry timeline = 8;
  repeated string graph_updates = 9;
  map<string, double> metrics = 10;
}

message AnalysisStreamChunk {
  string event_id = 1;
  string correlation_id = 2;
  string stage = 3;
  string message = 4;
  AIAnalysisResult result = 5;
}

service NexusIntelligence {
  rpc AnalyzeEvent(EventPayload) returns (AIAnalysisResult);
  rpc StreamAnalyzeEvent(EventPayload) returns (stream AnalysisStreamChunk);
}
